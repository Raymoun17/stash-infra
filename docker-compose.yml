name: stash

services:
  db:
    build:
      context: ${DB_BUILD_CONTEXT:-../stash-db}
    image: stash-db:local
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-stash}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  scraper-worker:
    build:
      context: ${SCRAPER_BUILD_CONTEXT:-../stash-scraper-worker}
      target: runtime
    restart: unless-stopped
    environment:
      SCRAPER_SERVICE_TOKEN: ${SCRAPER_SERVICE_TOKEN:?Set SCRAPER_SERVICE_TOKEN in .env}
      SCRAPER_BACKEND: playwright-stealth
      SCRAPER_MAX_CONCURRENCY: ${SCRAPER_MAX_CONCURRENCY:-2}
      SCRAPER_LOG_LEVEL: ${SCRAPER_LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  bff:
    build:
      context: ${BFF_BUILD_CONTEXT:-../stash-bff}
      target: runtime
    restart: unless-stopped
    command: ["sh", "-c", "npx prisma migrate deploy && npm start"]
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-stash}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-stash}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      REFRESH_COOKIE_PATH: /api/auth
      REFRESH_COOKIE_SECURE: ${REFRESH_COOKIE_SECURE:-false}
      SCRAPER_MODE: remote
      SCRAPER_WORKER_URL: http://scraper-worker:8000
      SCRAPER_SERVICE_TOKEN: ${SCRAPER_SERVICE_TOKEN}
      INTEGRATION_TIMEOUT_MS: ${INTEGRATION_TIMEOUT_MS:-20000}
      INTEGRATION_MAX_HTML_BYTES: ${INTEGRATION_MAX_HTML_BYTES:-10000000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      scraper-worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  price-refresher:
    build:
      context: ${BFF_BUILD_CONTEXT:-../stash-bff}
      target: runtime
    restart: unless-stopped
    command: ["npm", "run", "start:price-refresher"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-stash}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-stash}
      SCRAPER_WORKER_URL: http://scraper-worker:8000
      SCRAPER_SERVICE_TOKEN: ${SCRAPER_SERVICE_TOKEN}
      INTEGRATION_TIMEOUT_MS: ${INTEGRATION_TIMEOUT_MS:-20000}
      INTEGRATION_MAX_HTML_BYTES: ${INTEGRATION_MAX_HTML_BYTES:-10000000}
      PRICE_REFRESH_INTERVAL_MS: ${PRICE_REFRESH_INTERVAL_MS:-86400000}
      PRICE_REFRESH_BATCH_SIZE: ${PRICE_REFRESH_BATCH_SIZE:-100}
      PRICE_REFRESH_CONCURRENCY: ${PRICE_REFRESH_CONCURRENCY:-2}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      scraper-worker:
        condition: service_healthy
      bff:
        condition: service_healthy

  ui:
    build:
      context: ${UI_BUILD_CONTEXT:-../stash-ui}
      target: runtime
      args:
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_NOTIFICATION_POLL_INTERVAL_MS: ${NEXT_PUBLIC_NOTIFICATION_POLL_INTERVAL_MS:-60000}
        BFF_INTERNAL_URL: http://bff:3000
    restart: unless-stopped
    environment:
      BFF_INTERNAL_URL: http://bff:3000
    ports:
      - "${UI_PORT:-3000}:3000"
    depends_on:
      bff:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres-data:
